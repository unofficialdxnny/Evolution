<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolution | Modern Gaming Store</title>
    <meta name="description" content="Evolution - Your ultimate destination for games, hardware, and reviews.">
    <link rel="stylesheet" href="./Assets/css/style.css">
</head>

<body>

    <div class="navigation">
        <div class="brand">
            <span class="icon">
                <ion-icon name="layers-outline"></ion-icon>
            </span>
            <span class="title">EVOLUTION</span>
        </div>
        <ul>
            <li class="list active" data-target="home">
                <b></b>
                <b></b>
                <a href="#">
                    <span class="icon">
                        <ion-icon name="home-outline"></ion-icon>
                    </span>
                    <span class="title">Home</span>
                </a>
            </li>
            <li class="list" data-target="games">
                <b></b>
                <b></b>
                <a href="#">
                    <span class="icon">
                        <ion-icon name="game-controller-outline"></ion-icon>
                    </span>
                    <span class="title">Games</span>
                </a>
            </li>
            <li class="list" data-target="hardware">
                <b></b>
                <b></b>
                <a href="#">
                    <span class="icon">
                        <ion-icon name="hardware-chip-outline"></ion-icon>
                    </span>
                    <span class="title">Hardware</span>
                </a>
            </li>
        </ul>
    </div>
    <div class="toggle">
        <ion-icon name="menu-outline" class="open"></ion-icon>
        <ion-icon name="close-outline" class="close"></ion-icon>
    </div>

    <div class="main-content">
        <div id="home" class="section active">
            <h1>Evolution</h1>
            <p>This is Evolution, One Stop for all your gaming needs.</p>
        </div>
        <div id="games" class="section">
            <h1>Games Library</h1>
            <p>Browse our extensive collection of titles across all genres.</p>
        </div>
        <div id="hardware" class="section">
            <h1>Hardware Store</h1>
            <p>Find the best gear to upgrade your battle station and improve your performance.</p>
        </div>
    </div>
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

    <script src="Assets/js/main.js"></script>
</body>

</html>
